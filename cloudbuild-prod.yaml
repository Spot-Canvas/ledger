# Cloud Build configuration for production deployment to signalngn-prod
# Usage: gcloud builds submit --project=signalngn-prod --config=cloudbuild-prod.yaml --substitutions=_TAG=$(git rev-parse --short HEAD)

substitutions:
  _REGION: europe-west1
  _SERVICE_NAME: signalngn-trader
  _ARTIFACT_REGISTRY: europe-west1-docker.pkg.dev/signalngn-prod/signalngn
  _IMAGE_NAME: trader
  _CLOUDSQL_INSTANCE: signalngn-prod:europe-west1:signalngn-db
  _MEMORY: "256Mi"
  _CPU: "1"
  _MIN_INSTANCES: "0"
  _MAX_INSTANCES: "3"
  _CONCURRENCY: "80"
  _TAG: "latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # Step 1: Build the Docker image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - ${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}:${_TAG}
      - -t
      - ${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}:latest
      - .

  # Step 2: Push the image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}
    waitFor:
      - build

  # Step 3: Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --project=${PROJECT_ID}
      - --region=${_REGION}
      - --image=${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}:${_TAG}
      - --platform=managed
      - --memory=${_MEMORY}
      - --cpu=${_CPU}
      - --min-instances=${_MIN_INSTANCES}
      - --max-instances=${_MAX_INSTANCES}
      - --concurrency=${_CONCURRENCY}
      - --timeout=3600s
      - --port=8080
      - --allow-unauthenticated
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      # Route all egress through the default VPC so Cloud NAT gives us a static IP.
      # The NAT is pinned to the 'trader-nat-ip' reserved address (see scripts/setup-static-ip.sh).
      - --network=default
      - --subnet=default
      - --vpc-egress=all-traffic
      - --set-env-vars=ENVIRONMENT=production,LOG_LEVEL=info,CLOUDSQL_INSTANCE=${_CLOUDSQL_INSTANCE},DB_NAME=spot_canvas,DB_USER=spot,ENFORCE_AUTH=true,TRADING_ENABLED=true,TRADING_MODE=paper,SN_API_URL=https://signalngn-api-potbdcvufa-ew.a.run.app,PORTFOLIO_SIZE=10000,POSITION_SIZE_PCT=10,POSITION_SIZE_MAX_PCT=20,MIN_POSITION_SIZE=50
      - --set-secrets=DB_PASSWORD=signalngn-prod-db-password:latest,NATS_URLS=signalngn-prod-nats-url:latest,NATS_CREDS=signalngn-prod-nats-creds:latest,SN_API_KEY=signalngn-prod-sn-api-key:latest
    waitFor:
      - push

images:
  - ${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}:${_TAG}
  - ${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}:latest

timeout: 600s
