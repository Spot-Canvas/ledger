version: 2

project_name: trader

before:
  hooks:
    - go mod tidy

builds:
  - id: trader-cli
    main: ./cmd/trader
    binary: trader
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: trader-cli
    ids: [trader-cli]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: Signal-ngn
    name: trader

homebrew_casks:
  - name: trader
    ids: [trader-cli]
    repository:
      owner: Signal-ngn
      name: trader
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/Signal-ngn/trader"
    description: "Signal Ngn trader CLI — query accounts, positions, trades, and manage live exchange orders"
    license: "MIT"
    binaries: [trader]
