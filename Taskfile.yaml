version: "3"

vars:
  BINARY: bin/trader

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ─── Build & Run ───────────────────────────────────────────

  build:
    desc: Build trader server binary
    cmds:
      - go build -o {{.BINARY}} ./cmd/traderd

  build:cli:
    desc: Build trader CLI binary (cmd/trader → bin/trader)
    cmds:
      - go build -o bin/trader ./cmd/trader

  build:all:
    desc: Build all binaries (server + CLI)
    deps: [build, build:cli]

  run:
    desc: Run trader service (build + run)
    deps: [build]
    dotenv: [".env"]
    cmds:
      - ./{{.BINARY}}

  dev:
    desc: Run trader service directly with go run
    dotenv: [".env"]
    cmds:
      - ENFORCE_AUTH=false HTTP_PORT=8080 go run ./cmd/traderd

  # ─── Testing ───────────────────────────────────────────────

  test:
    desc: Run unit tests
    cmds:
      - go test ./... -count=1

  test:v:
    desc: Run unit tests (verbose)
    cmds:
      - go test ./... -v -count=1

  test:race:
    desc: Run unit tests with race detector
    cmds:
      - go test -race ./... -count=1

  test:integration:
    desc: Run integration tests (requires PostgreSQL + NATS)
    dotenv: [".env"]
    cmds:
      - go test -tags=integration ./... -v -count=1

  test:all:
    desc: Run unit + integration tests
    dotenv: [".env"]
    cmds:
      - go test -tags=integration ./... -v -count=1 -race

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -func=coverage.out
      - echo "Open HTML report with{{":"}} go tool cover -html=coverage.out"

  # ─── Code Quality ──────────────────────────────────────────

  lint:
    desc: Run go vet and staticcheck
    cmds:
      - go vet ./...
      - cmd: staticcheck ./...
        ignore_error: true

  fmt:
    desc: Format all Go files
    cmds:
      - gofmt -w .

  check:
    desc: Run all checks (fmt, vet, test)
    cmds:
      - gofmt -l .
      - go vet ./...
      - go test ./... -count=1

  # ─── Infrastructure ────────────────────────────────────────

  infra:up:
    desc: Start PostgreSQL and NATS containers
    cmds:
      - |
        if docker ps --format '{{`{{.Names}}`}}' 2>/dev/null | grep -q spot-canvas-db; then
          echo "ℹ  spot-canvas-db is already running on port 5432 — skipping postgres"
          echo "   The trader will share the existing database."
          SKIP_PG=1
        fi
        if docker ps --format '{{`{{.Names}}`}}' 2>/dev/null | grep -q spot-canvas-nats; then
          echo "ℹ  spot-canvas-nats is already running on port 4222 — skipping nats"
          SKIP_NATS=1
        fi

        if [ "${SKIP_PG:-}" = "1" ] && [ "${SKIP_NATS:-}" = "1" ]; then
          echo ""
          echo "✓ Using existing infrastructure. Nothing to start."
          exit 0
        fi

        # Start only the services that aren't already running
        SERVICES=""
        [ "${SKIP_PG:-}" != "1" ] && SERVICES="$SERVICES postgres"
        [ "${SKIP_NATS:-}" != "1" ] && SERVICES="$SERVICES nats"
        docker compose up -d $SERVICES

  infra:down:
    desc: Stop trader containers
    cmds:
      - docker compose down

  infra:logs:
    desc: Show container logs
    cmds:
      - docker compose logs -f

  infra:reset:
    desc: Stop containers and remove volumes (clean slate)
    cmds:
      - docker compose down -v

  infra:status:
    desc: Show which database and NATS containers are running
    cmds:
      - |
        echo "=== PostgreSQL ==="
        docker ps --filter "publish=5432" --format "table {{`{{.Names}}`}}\t{{`{{.Status}}`}}\t{{`{{.Ports}}`}}" 2>/dev/null || echo "  (none)"
        echo ""
        echo "=== NATS ==="
        docker ps --filter "publish=4222" --format "table {{`{{.Names}}`}}\t{{`{{.Status}}`}}\t{{`{{.Ports}}`}}" 2>/dev/null || echo "  (none)"

  db:logs:
    desc: Show PostgreSQL logs
    cmds:
      - docker compose logs -f postgres

  nats:logs:
    desc: Show NATS logs
    cmds:
      - docker compose logs -f nats

  # ─── Docker ────────────────────────────────────────────────

  docker:build:
    desc: Build Docker image locally
    cmds:
      - docker build -t trader:latest .

  docker:run:
    desc: Run Docker image locally (connects to host network)
    cmds:
      - >-
        docker run --rm
        --network host
        -e DATABASE_URL=postgres://spot:spot@localhost:5432/spot_canvas?sslmode=disable
        -e NATS_URLS=nats://localhost:4222
        trader:latest

  # ─── Deployment ────────────────────────────────────────────

  deploy:production:
    desc: Deploy to production via Cloud Build using cloudbuild-prod.yaml
    cmds:
      - gcloud builds submit --project=signalngn-prod --config=cloudbuild-prod.yaml --substitutions=_TAG=$(git rev-parse --short HEAD)

  # ─── Utilities ─────────────────────────────────────────────

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
      - rm -f coverage.out

  deps:
    desc: Download and tidy dependencies
    cmds:
      - go mod download
      - go mod tidy

  env:
    desc: Create .env from .env.example
    status:
      - test -f .env
    cmds:
      - cp .env.example .env
      - echo "Created .env from .env.example — edit as needed"

  setup:
    desc: Full local setup (env + deps + infra + run)
    cmds:
      - task: env
      - task: deps
      - task: infra:up
      - echo ""
      - echo "Infrastructure is starting. Wait a few seconds, then run:"
      - echo "  task dev"
