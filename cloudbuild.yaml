# Cloud Build configuration for trader service
#
# Usage:
#   gcloud builds submit --project=spotcanvas-staging --substitutions=_ENV=staging
#   gcloud builds submit --project=spotcanvas-staging --substitutions=_ENV=production

substitutions:
  _REGION: europe-west3
  _ENV: staging
  _TENANT_ID: c2899e28-2bbe-47c1-8d29-84ee1a04fd37
  _TRADER_ACCOUNTS: paper-transformer
  _IMAGE_NAME: trader
  _MEMORY: "512Mi"
  _CPU: "1"
  _MIN_INSTANCES: "0"
  _MAX_INSTANCES: "1"
  _CONCURRENCY: "80"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # Step 1: Build the Docker image
  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/spot-canvas/${_IMAGE_NAME}"
        SHA="${SHORT_SHA:-latest}"
        docker build -t "$$IMAGE:$$SHA" -t "$$IMAGE:latest" .

  # Step 2: Push the image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/spot-canvas/${_IMAGE_NAME}"
        docker push --all-tags "$$IMAGE"
    waitFor:
      - build

  # Step 3: Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        ENV="${_ENV}"
        echo "Deploying trader to $$ENV environment..."

        if [[ "$$ENV" == "staging" ]]; then
          SERVICE_NAME="ts-${_TENANT_ID}"
          SECRET_PREFIX="spot-canvas-staging"
          FIRESTORE_PROJECT="${PROJECT_ID}"
        else
          SERVICE_NAME="ts-${_TENANT_ID}"
          SECRET_PREFIX="spot-canvas"
          FIRESTORE_PROJECT="${PROJECT_ID}"
        fi

        gcloud run deploy "$$SERVICE_NAME" \
          --project="${PROJECT_ID}" \
          --region="${_REGION}" \
          --image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/spot-canvas/${_IMAGE_NAME}:latest" \
          --platform=managed \
          --memory="${_MEMORY}" \
          --cpu="${_CPU}" \
          --min-instances="${_MIN_INSTANCES}" \
          --max-instances="${_MAX_INSTANCES}" \
          --concurrency="${_CONCURRENCY}" \
          --timeout=300s \
          --port=8080 \
          --allow-unauthenticated \
          --set-env-vars="ENVIRONMENT=$$ENV,LOG_LEVEL=info,TENANT_ID=${_TENANT_ID},TRADING_ENABLED=true,TRADING_MODE=paper,TRADER_ACCOUNTS=${_TRADER_ACCOUNTS},FIRESTORE_PROJECT_ID=$$FIRESTORE_PROJECT" \
          --set-secrets="SN_API_KEY=$$SECRET_PREFIX-sn-api-key:latest,NATS_URLS=$$SECRET_PREFIX-nats-url:latest,NATS_CREDS=$$SECRET_PREFIX-nats-creds:latest"

        URL=$$(gcloud run services describe "$$SERVICE_NAME" \
          --project="${PROJECT_ID}" \
          --region="${_REGION}" \
          --format="value(status.url)" 2>/dev/null || echo "unavailable")
        echo "Deployed to: $$URL"
    waitFor:
      - push

# images block omitted — push step handles tagging and uploading directly

timeout: 600s
